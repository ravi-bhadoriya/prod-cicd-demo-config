apiVersion: apps/v1
kind: Deployment

metadata:
  name: prod-cicd-demo
  namespace: prod-demo

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: prod-cicd-demo

  template:
    metadata:
      labels:
        app: prod-cicd-demo

    spec:
      containers:
      - name: app
        image: 779599553744.dkr.ecr.ap-south-1.amazonaws.com/prod-cicd-demo:30bd0d2fdab51baeac8f6dc7f74923004f464e7e
        imagePullPolicy: Always

        env:
        - name: APP_VERSION
          value: "30bd0d2"

        envFrom:
        - configMapRef:
            name: app-config

        ports:
        - containerPort: 5000

        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20

        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"